<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="#060E1F"/>
  <!-- 외곽 원 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1E40AF" stroke-width="8" opacity="0.6"/>
  <!-- 내부 원 -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.4"/>
  <!-- 번개 아이콘 (Zap) -->
  <polygon points="272,120 200,272 248,272 240,392 312,240 264,240" 
           fill="#D4AF37" opacity="0.95"/>
  <!-- 골드 글로우 -->
  <polygon points="272,120 200,272 248,272 240,392 312,240 264,240" 
           fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
</svg>
